name: Lore Validate

on:
  push:
    branches: [dev, main]
    paths:
      - 'lore/**'
      - '.github/workflows/lore-validate.yml'
  pull_request:
    paths:
      - 'lore/**'
      - '.github/workflows/lore-validate.yml'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lore
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # zero-dependency engine: no install step, the suite IS the spec
      - name: Run test suite
        run: npm test

      - name: Syntax-check engine and hook scripts
        run: |
          for f in scripts/mine-skills.mjs scripts/lib/*.mjs scripts/hooks/*.mjs; do
            node --check "$f"
          done
