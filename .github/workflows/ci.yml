name: CI

# Scoped to the Go CLI: lore/ has its own workflow (lore-validate.yml).
# paths and paths-ignore cannot be combined on one event, so exclusions are ! patterns.
on:
  push:
    branches: [dev, main]
    paths:
      - 'specstory-cli/**'
      - '.goreleaser.yml'
      - 'scripts/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - '!**/*.md'
      - '!**/.specstory/**'
  pull_request:
    paths:
      - 'specstory-cli/**'
      - '.goreleaser.yml'
      - 'scripts/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - '!**/*.md'
      - '!**/.specstory/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: specstory-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache-dependency-path: specstory-cli/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: specstory-cli

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: specstory-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache-dependency-path: specstory-cli/go.sum
      - name: Run tests
        run: go test ./...
